<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotifinho Web</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div id="searchView">
            <h1>Spotifinho Web</h1>

            <div class="player-container">
                <div id="playerInfo" class="player-info" style="display: none;">
                    <img id="currentTrackThumbnail" src="" alt="Thumbnail" class="player-thumbnail">
                    <div class="player-track-details">
                        <h3 id="currentTrackTitle"></h3>
                        <p id="currentTrackArtist"></p>
                    </div>
                </div>
                <audio class="audio-player" id="audioPlayer" controls></audio>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Pesquisar músicas">
                <button id="searchButton">Buscar</button>
            </div>
            <ul class="results-list" id="resultsList">
                <!-- Resultados da pesquisa serão exibidos aqui -->
            </ul>
        </div>

        <div id="libraryView" style="display: none;">
            <h1>Minha Biblioteca</h1>
            <ul class="results-list" id="libraryList">
                <!-- Músicas curtidas serão exibidas aqui -->
            </ul>
        </div>
    </div>

    <nav class="bottom-nav">
        <button id="navSearch" class="active"><i class="fas fa-search"></i><span>Busca</span></button>
        <button id="navLibrary"><i class="fas fa-music"></i><span>Biblioteca</span></button>
    </nav>

    <script src="/static/script.js"></script>
</body>
</html>
