<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotifinho Web</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Spotifinho Web</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Pesquisar músicas no YouTube...">
            <button id="searchButton">Buscar</button>
        </div>
        <ul class="results-list" id="resultsList">
            <!-- Resultados da pesquisa serão exibidos aqui -->
        </ul>
        <audio class="audio-player" id="audioPlayer" controls></audio>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
