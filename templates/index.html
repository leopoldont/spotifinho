<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotifinho Web</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div id="searchView">
            <h1>Spotifinho Web</h1>

            <div class="player-container">
                <div id="playerInfo" class="player-info" style="display: none;">
                    <img id="currentTrackThumbnail" src="" alt="Thumbnail" class="player-thumbnail">
                    <div class="player-track-details">
                        <h3 id="currentTrackTitle"></h3>
                        <p id="currentTrackArtist"></p>
                    </div>
                </div>
                <audio class="audio-player" id="audioPlayer" controls></audio>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Pesquisar músicas">
                <button id="searchButton">Buscar</button>
            </div>
            <ul class="results-list" id="resultsList">
                <!-- Resultados da pesquisa serão exibidos aqui -->
            </ul>
        </div>

        <div id="libraryView" style="display: none;">
            <div class="library-header">
                <button id="libraryBackButton" style="display: none;"><i class="fas fa-arrow-left"></i></button>
                <h1 id="libraryTitle">Minha Biblioteca</h1>
            </div>
            <ul class="library-items-list" id="libraryList">
                <!-- Playlists ou músicas da playlist serão exibidas aqui -->
            </ul>
            <div id="libraryActions">
                <button id="createPlaylistButton">Criar Nova Playlist</button>
            </div>
        </div>

        <div id="queueView" style="display: none;">
            <h1>Fila de Reprodução</h1>
            <ul class="results-list" id="queueList">
                <!-- Músicas na fila serão exibidas aqui -->
            </ul>
        </div>
    </div>

    <div id="addToPlaylistModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Adicionar à playlist</h2>
            <ul id="modalPlaylistList"></ul>
        </div>
    </div>

    <nav class="bottom-nav">
        <button id="navSearch" class="active"><i class="fas fa-search"></i><span>Busca</span></button>
        <button id="navLibrary"><i class="fas fa-music"></i><span>Biblioteca</span></button>
        <button id="navQueue"><i class="fas fa-list-ol"></i><span>Fila</span></button>
    </nav>

    <script src="/static/script.js"></script>
</body>
</html>
